<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RatePulse — a plain-language currency slip</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3d6c8c">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --ink:#1e212a;
    --ink-soft:#1e212a92;
    --ink-faint:#1e212a55;
    --paper:#f2ede3;
    --card:#faf7f1;
    --line:#1e212a22;
    --line-strong:#1e212a3c;
    --orange:#c45c30;
    --orange-soft:#c45c3014;
    --blue:#3d6c8c;
    --blue-soft:#3d6c8c14;
    --indigo:#3d6c8c;
    --indigo-deep:#2c5069;
    --indigo-soft:#3d6c8c14;
    --stamp:#b0452a;
    --stamp-soft:#b0452a10;
    --mono: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
    --serif: 'Fraunces', Georgia, serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 12% 8%, #ffffff30, transparent 40%),
      radial-gradient(circle at 92% 88%, #00000008, transparent 45%),
      var(--paper);
    color:var(--ink);
    font-family:var(--mono);
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:940px;margin:0 auto;padding:40px 20px 90px;}

  /* Masthead */
  .masthead{
    display:flex;justify-content:space-between;align-items:flex-end;
    border-bottom:2px solid var(--ink);
    padding-bottom:16px;margin-bottom:6px;
    flex-wrap:wrap;gap:10px;
  }
  .brand{display:flex;align-items:baseline;gap:12px;}
  h1{
    font-family:var(--serif);font-size:38px;line-height:1;margin:0;
    font-weight:700;letter-spacing:-0.01em;font-optical-sizing:auto;
  }
  .tag{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);border-left:2px solid var(--orange);padding-left:10px;}
  .tagline{display:flex;gap:8px;align-items:center;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);margin:10px 0 26px;}
  .tagline .dot{width:5px;height:5px;border-radius:50%;display:inline-block;}
  .dot-orange{background:var(--orange);}
  .dot-blue{background:var(--blue);}
  .today{font-size:11px;color:var(--ink-soft);text-align:right;letter-spacing:.02em;}
  .today b{color:var(--ink);}
  .sub{font-size:13.5px;color:var(--ink-soft);max-width:70ch;margin:0 0 26px;}

  /* Layout */
  .layout{display:grid;grid-template-columns:300px 1fr;gap:22px;align-items:start;}
  @media (max-width: 760px){.layout{grid-template-columns:1fr;}}

  .panel{background:var(--card);border:1px solid var(--line-strong);}
  .panel-head{
    font-family:var(--serif);font-size:12.5px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;
    padding:14px 18px;border-bottom:1px solid var(--line);background:var(--indigo-soft);
  }
  .panel-body{padding:18px;}

  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:15px;}
  .field label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-soft);}
  input[type=number], select{
    font-family:var(--mono);font-size:15px;padding:10px 10px;border:1px solid var(--line-strong);
    background:#fff;color:var(--ink);border-radius:0;width:100%;
  }
  input[type=number]:focus, select:focus{outline:2px solid var(--indigo);outline-offset:1px;}
  .pairrow{display:flex;gap:10px;}
  .pairrow .field{flex:1;}

  button{
    font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:.05em;
    background:linear-gradient(90deg, var(--orange), var(--blue));color:#faf7f1;border:none;padding:13px 22px;
    cursor:pointer;text-transform:uppercase;border-radius:0;width:100%;margin-top:4px;
  }
  button:hover{filter:brightness(0.92);}
  button:disabled{background:#1e212a3a;cursor:wait;filter:none;}
  .loading{font-size:12px;color:var(--ink-soft);margin-top:12px;}
  .error{background:#f3e3df;border:1px solid var(--stamp);color:var(--stamp);padding:11px 13px;font-size:12.5px;margin-top:12px;}

  /* Result ticket */
  .ticket{background:var(--card);border:1px solid var(--line-strong);position:relative;min-height:220px;}
  .ticket-empty{
    padding:60px 24px;text-align:center;color:var(--ink-faint);font-size:13px;
    display:flex;align-items:center;justify-content:center;height:100%;min-height:220px;
  }
  .perf{height:1px;background-image:repeating-linear-gradient(90deg, var(--line-strong) 0 7px, transparent 7px 14px);}
  .ticket-head{padding:20px 24px 4px;}
  .eyebrow{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft);}
  .totalrow{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin:6px 0 4px;}
  .totalfig{font-family:var(--serif);font-size:38px;font-weight:700;color:var(--indigo);letter-spacing:-0.01em;}
  .totalcur{font-family:var(--serif);font-size:16px;color:var(--ink-soft);}
  .direction{
    display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;
    padding:3px 9px;letter-spacing:.03em;
  }
  .dir-up{background:#e2ebe2;color:#2c5c38;}
  .dir-down{background:#f3e3df;color:var(--stamp);}
  .dir-flat{background:var(--indigo-soft);color:var(--indigo);}
  .headline{font-size:13px;color:var(--ink-soft);margin:10px 0 0;line-height:1.6;}

  .ticket-body{padding:18px 24px 6px;}
  .tline{display:flex;align-items:baseline;gap:8px;margin-bottom:10px;}
  .tline .lbl{white-space:nowrap;font-size:11.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;}
  .tline .dots{flex:1;border-bottom:1px dotted var(--line-strong);position:relative;top:-4px;}
  .tline .val{white-space:nowrap;font-size:13.5px;font-weight:600;}

  .working{margin:14px 24px 4px;padding:13px 15px;background:var(--stamp-soft);border-left:2px solid var(--stamp);font-size:12px;}
  .working .wt{font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--stamp);font-weight:600;margin-bottom:7px;}
  .working code{background:#fff;padding:1px 4px;font-family:var(--mono);border:1px solid var(--line);}

  .ticket-foot{padding:16px 24px 20px;}
  .barcode{
    height:30px;
    background-image:repeating-linear-gradient(90deg,
      var(--ink) 0 1px, transparent 1px 3px,
      var(--ink) 3px 5px, transparent 5px 6px,
      var(--ink) 6px 8px, transparent 8px 11px,
      var(--ink) 11px 12px, transparent 12px 15px);
    opacity:.82;
  }
  .serial{font-size:9.5px;color:var(--ink-faint);letter-spacing:.08em;margin-top:6px;text-align:center;}

  footer{margin-top:28px;font-size:11.5px;color:var(--ink-soft);border-top:1px solid var(--line);padding-top:16px;}
  footer a{color:var(--indigo);}
  footer p{margin:0 0 8px;}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState } = React;

const CURRENCIES = ["USD","EUR","GBP","INR","JPY","AUD","CAD","CHF","CNY","SGD","AED","ZAR","BRL"];

function fmt(n, digits = 4) {
  return Number(n).toLocaleString(undefined, { maximumFractionDigits: digits });
}

function daysAgoISO(n) {
  const d = new Date();
  d.setDate(d.getDate() - n);
  return d.toISOString().slice(0, 10);
}

async function fetchJSON(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error("fetch-failed");
  return res.json();
}

async function fetchRate(dateStr, from, to) {
  const url = `https://api.frankfurter.dev/v1/${dateStr}?base=${from}&symbols=${to}`;
  const data = await fetchJSON(url);
  if (!data || !data.rates || typeof data.rates[to] !== "number") throw new Error("no-data");
  return { rate: data.rates[to], date: data.date };
}

function RateDrift() {
  const [amount, setAmount] = useState(100);
  const [from, setFrom] = useState("USD");
  const [to, setTo] = useState("INR");
  const [lookback, setLookback] = useState(30);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [result, setResult] = useState(null);
  const [working, setWorking] = useState(null);

  const todayLabel = new Date().toLocaleDateString(undefined, { weekday: "short", year: "numeric", month: "short", day: "numeric" });

  async function handleCheck() {
    setError("");
    setResult(null);
    setWorking(null);

    if (from === to) {
      setError(`Pick two different currencies — ${from} to ${from} is always 1:1, there's nothing to check.`);
      return;
    }
    const amt = parseFloat(amount);
    if (!amt || amt <= 0 || isNaN(amt)) {
      setError("Enter an amount greater than 0.");
      return;
    }

    setLoading(true);
    try {
      const todayResult = await fetchRate("latest", from, to);
      const pastDate = daysAgoISO(lookback);
      const pastResult = await fetchRate(pastDate, from, to);

      const converted = amt * todayResult.rate;
      const pctChange = ((todayResult.rate - pastResult.rate) / pastResult.rate) * 100;
      const direction = pctChange > 0.005 ? "strengthened" : (pctChange < -0.005 ? "weakened" : "held roughly steady");
      const arrow = pctChange > 0.005 ? "▲" : (pctChange < -0.005 ? "▼" : "→");
      const dirClass = pctChange > 0.005 ? "dir-up" : (pctChange < -0.005 ? "dir-down" : "dir-flat");

      setResult({
        amt, from, to, lookback,
        converted, pctChange, direction, arrow, dirClass,
        rate: todayResult.rate,
        todayDate: todayResult.date,
        pastDate: pastResult.date,
        requestedPastDate: pastDate,
      });

      if (from !== "EUR" && to !== "EUR") {
        try {
          const eurBase = await fetchJSON(`https://api.frankfurter.dev/v1/latest?base=EUR&symbols=${from},${to}`);
          const eurToFrom = eurBase.rates[from];
          const eurToTo = eurBase.rates[to];
          const recomputed = eurToTo / eurToFrom;
          setWorking({ type: "triangulated", from, to, eurToFrom, eurToTo, recomputed, direct: todayResult.rate });
        } catch (e) {
          // non-critical — main result already stands
        }
      } else {
        setWorking({ type: "direct", currency: from === "EUR" ? to : from });
      }
    } catch (err) {
      setError("Couldn't get rate data for that combination right now — the API may be briefly unavailable, or one of these currencies isn't covered. Try again in a moment, or pick a different pair.");
    } finally {
      setLoading(false);
    }
  }

  const serial = result ? `RP·${result.from}${result.to}·${result.todayDate.replaceAll("-", "")}` : "";

  return (
    <div className="wrap">
      <div className="masthead">
        <div className="brand">
          <h1>RatePulse</h1>
          <span className="tag">ECB sourced · no key required</span>
        </div>
        <div className="today">Terminal date<br /><b>{todayLabel}</b></div>
      </div>
      <div className="tagline"><span className="dot dot-orange"></span>Track<span className="dot dot-blue"></span>Compare<span className="dot dot-orange"></span>Convert</div>
      <p className="sub">Type a currency pair and an amount. This looks up today's official reference rate, compares it to the rate from earlier, and states — in one plain sentence — what actually happened. Not a raw number, not a JSON blob.</p>

      <div className="layout">
        <div className="panel">
          <div className="panel-head">Check a pair</div>
          <div className="panel-body">
            <div className="field">
              <label>Amount</label>
              <input type="number" min="0" step="any" value={amount} onChange={e => setAmount(e.target.value)} />
            </div>
            <div className="pairrow">
              <div className="field">
                <label style={{color: "var(--orange)"}}>From</label>
                <select value={from} onChange={e => setFrom(e.target.value)}>
                  {CURRENCIES.map(c => <option key={c} value={c}>{c}</option>)}
                </select>
              </div>
              <div className="field">
                <label style={{color: "var(--blue)"}}>To</label>
                <select value={to} onChange={e => setTo(e.target.value)}>
                  {CURRENCIES.map(c => <option key={c} value={c}>{c}</option>)}
                </select>
              </div>
            </div>
            <div className="field">
              <label>Compare to</label>
              <select value={lookback} onChange={e => setLookback(parseInt(e.target.value, 10))}>
                <option value={7}>7 days ago</option>
                <option value={30}>30 days ago</option>
                <option value={90}>90 days ago</option>
              </select>
            </div>
            <button onClick={handleCheck} disabled={loading}>{loading ? "Checking…" : "Check rate"}</button>
            {loading && <p className="loading">Fetching from the ECB's daily rates via Frankfurter…</p>}
            {error && <div className="error">{error}</div>}
          </div>
        </div>

        <div className="ticket">
          {!result ? (
            <div className="ticket-empty">Your rate slip will print here once you check a pair.</div>
          ) : (
            <React.Fragment>
              <div className="ticket-head">
                <div className="eyebrow">{result.amt} {result.from} converts to</div>
                <div className="totalrow">
                  <span className="totalfig">{fmt(result.converted, 2)}</span>
                  <span className="totalcur">{result.to}</span>
                  <span className={`direction ${result.dirClass}`}>{result.arrow} {fmt(Math.abs(result.pctChange), 2)}% vs {result.lookback}d ago</span>
                </div>
                <p className="headline">
                  {result.from} has <b>{result.direction}</b> against {result.to} over the past {result.lookback} days.
                </p>
              </div>

              <div className="perf"></div>

              <div className="ticket-body">
                <div className="tline"><span className="lbl">Today's rate</span><span className="dots"></span><span className="val">1 {result.from} = {fmt(result.rate)} {result.to}</span></div>
                <div className="tline"><span className="lbl">Rate {result.lookback}d ago</span><span className="dots"></span><span className="val">{result.pastDate}</span></div>
                <div className="tline"><span className="lbl">Latest rate as of</span><span className="dots"></span><span className="val">{result.todayDate}</span></div>
              </div>

              {working && (
                <div className="working">
                  <div className="wt">How this number is actually calculated</div>
                  {working.type === "triangulated" ? (
                    <div>
                      The ECB doesn't publish {working.from}→{working.to} directly — it only publishes rates against
                      EUR. So the API (and this tool) derives it: <code>1 EUR = {fmt(working.eurToFrom)} {working.from}</code>{" "}
                      and <code>1 EUR = {fmt(working.eurToTo)} {working.to}</code>, giving{" "}
                      <code>1 {working.from} = {fmt(working.recomputed)} {working.to}</code> — matching the{" "}
                      {fmt(working.direct)} shown above (small gaps are just rounding at each step).
                    </div>
                  ) : (
                    <div>
                      {working.currency} is quoted directly against EUR by the ECB, so no triangulation is needed
                      here — this is a direct published rate.
                    </div>
                  )}
                </div>
              )}

              <div className="perf"></div>
              <div className="ticket-foot">
                <div className="barcode"></div>
                <div className="serial">{serial}</div>
              </div>
            </React.Fragment>
          )}
        </div>
      </div>

      <footer>
        <p>
          Rates come from the <a href="https://frankfurter.dev/v1/" target="_blank" rel="noopener">Frankfurter v1 API</a>,
          a free, keyless service that redistributes the European Central Bank's daily reference rates. The ECB only
          publishes rates against the euro — so any pair not involving EUR is a cross-rate, computed by dividing one
          euro rate by another, shown above under "how this number is calculated."
        </p>
        <p>
          No rate is published on weekends or ECB holidays; the tool always shows the actual date used, not the date
          you asked for. Educational tool, not financial advice — see the Citation Ledger in the repo for full sourcing.
        </p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<RateDrift />);
</script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {
        // Installability is a bonus, not a requirement — fail silently if it doesn't register.
      });
    });
  }
</script>
</body>
</html>
